services:
  db:
    image: postgres:16-alpine
    restart: always
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: local
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U root -d local']
      interval: 5s
      timeout: 5s
      retries: 5

  seaweedfs:
    image: chrislusf/seaweedfs
    command: 'server -s3 -dir=/data -master.volumeSizeLimitMB=100'
    ports:
      - 9333:9333 # Master
      - 8080:8080 # Volume
      - 8888:8888 # Filer
      - 8333:8333 # S3
    volumes:
      - seaweedfs_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://localhost:9333/cluster/status']
      interval: 10s
      timeout: 5s
      retries: 5

  livekit:
    image: livekit/livekit-server
    command: --config /etc/livekit.yaml
    ports:
      - 7880:7880 # HTTP / WebSocket
      - 7881:7881 # RTC (TCP)
      - 7882:7882/udp # RTC (UDP)
    configs:
      - source: livekit_config
        target: /etc/livekit.yaml

configs:
  livekit_config:
    content: |
      port: 7880
      rtc:
        tcp_port: 7881
        udp_port: 7882
        use_external_ip: false
      keys:
        devkey: secret1234567890secret1234567890
      logging:
        level: info

volumes:
  pgdata:
  seaweedfs_data:
